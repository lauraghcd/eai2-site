baseURL = "https://hub.eai2.cloud/"
languageCode = "en"
title = "EAI² — Embodied AI Intelligence"
theme = "PaperMod"
paginate = 9

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "EAI²"
  description = "Your guide to embodied AI, humanoid robots, VLA models, and the future of physical intelligence"
  keywords = ["embodied AI", "humanoid robot", "VLA", "robotics", "physical intelligence", "robot learning", "GR00T", "pi0", "OpenVLA", "humanoid robot comparison"]
  author = "EAI² Team"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  [params.homeInfoParams]
    Title = "Embodied AI Intelligence"
    Content = """Your comprehensive guide to **Embodied AI**, humanoid robots, VLA foundation models, and the future of physical intelligence.

We cover **research breakthroughs**, **engineering tutorials**, **product comparisons**, and **industry analysis** — updated weekly."""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lauraghcd/eai2-site"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[params.analytics]
  [params.analytics.google]
    SiteVerificationTag = ""

[params.assets]
  disableHLJS = true

[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "dracula"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 5

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
