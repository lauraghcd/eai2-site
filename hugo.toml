baseURL = "https://hub.eai2.cloud/"
languageCode = "en"
title = "EAI² — Embodied AI Intelligence"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "EAI²"
  description = "Your guide to embodied AI, humanoid robots, VLA models, and the future of physical intelligence"
  keywords = ["embodied AI", "humanoid robot", "VLA", "robotics", "physical intelligence", "robot learning"]
  author = "EAI² Team"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Welcome to EAI²"
    Content = "Your comprehensive guide to **Embodied AI**, humanoid robots, VLA foundation models, and the future of physical intelligence. We cover research breakthroughs, engineering tutorials, product comparisons, and industry analysis."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[params.analytics]
  [params.analytics.google]
    SiteVerificationTag = ""

[params.assets]
  favicon = "/favicon.ico"
  disableHLJS = true

[markup]
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
