baseURL = "https://eai2.cloud/"
languageCode = "en"
title = "EAI² — Embodied AI Intelligence"
theme = "PaperMod"
paginate = 9

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "EAI²"
  description = "Your guide to embodied AI, humanoid robots, VLA models, and the future of physical intelligence"
  keywords = ["embodied AI", "humanoid robot", "VLA", "robotics", "physical intelligence", "robot learning", "GR00T", "pi0", "OpenVLA", "humanoid robot comparison"]
  author = "EAI² Team"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  [params.homeInfoParams]
    Title = " "
    Content = " "

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lauraghcd/eai2-site"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true

  [params.footer]
    hideCopyright = false
    text = "[About](/about/) · [Editorial Policy](/editorial-policy/) · [Contact](/contact/) · [Privacy](/privacy/)"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[params.analytics]
  [params.analytics.google]
    SiteVerificationTag = ""

[params.assets]
  disableHLJS = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "dracula"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[[menu.main]]
  identifier = "nav-start"
  name = "Start Here"
  url = "/learning-path/"
  weight = 1

[[menu.main]]
  identifier = "nav-intelligence"
  name = "Intelligence"
  url = "/categories/robot-intelligence/"
  weight = 10

[[menu.main]]
  identifier = "nav-hardware"
  name = "Hardware"
  url = "/categories/robot-hardware/"
  weight = 20

[[menu.main]]
  identifier = "nav-tools"
  name = "Tools"
  url = "/categories/tools-and-frameworks/"
  weight = 30

[[menu.main]]
  identifier = "nav-industry"
  name = "Industry"
  url = "/categories/industry/"
  weight = 40

[[menu.main]]
  identifier = "nav-regions"
  name = "Regions"
  url = "/regions/"
  weight = 45

[[menu.main]]
  identifier = "nav-search"
  name = "Search"
  url = "/search/"
  weight = 50

[[menu.main]]
  identifier = "nav-newsletter"
  name = "Field Notes"
  url = "/newsletter/"
  weight = 55

[[menu.main]]
  identifier = "nav-about"
  name = "About"
  url = "/about/"
  weight = 60

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
